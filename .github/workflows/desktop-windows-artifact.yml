name: Desktop Windows Prototype Artifact

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/desktop/**'
      - 'apps/worker/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop-windows-artifact.yml'

jobs:
  build-windows-artifact:
    name: Build unsigned Windows desktop artifact
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared, worker, and desktop
        run: |
          npm run build -w @opencause/shared
          npm run build -w @opencause/worker
          npm run build -w @opencause/desktop

      - name: Test desktop package
        run: npm run test -w @opencause/desktop

      - name: Build unsigned Windows installer prototype
        run: npm run package:win:unsigned -w @opencause/desktop

      - name: Upload unsigned prototype artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencause-compute-worker-windows-unsigned-prototype
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/win-unpacked/**
          if-no-files-found: error
          retention-days: 14
