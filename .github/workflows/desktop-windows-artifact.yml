name: Desktop Windows Prototype Artifact

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/desktop/**'
      - 'apps/worker/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop-windows-artifact.yml'

jobs:
  build-windows-artifact:
    name: Build unsigned Windows desktop artifact
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared, worker, and desktop
        run: |
          npm run build -w @opencause/shared
          npm run build -w @opencause/worker
          npm run build -w @opencause/desktop

      - name: Test desktop package
        run: npm run test -w @opencause/desktop

      - name: Build unsigned Windows installer prototype
        run: npm run package:win:unsigned -w @opencause/desktop

      - name: Generate checksums and prototype release notes
        shell: pwsh
        run: |
          $releaseDir = 'apps/desktop/release'
          $files = Get-ChildItem $releaseDir -Recurse -File | Where-Object { $_.Name -match '\\.(exe|zip|7z)$' -or $_.FullName -match 'win-unpacked' }
          $checksumPath = Join-Path $releaseDir 'SHA256SUMS.txt'
          Remove-Item $checksumPath -ErrorAction SilentlyContinue
          foreach ($file in $files) {
            $hash = Get-FileHash $file.FullName -Algorithm SHA256
            $relative = Resolve-Path -Relative $file.FullName
            Add-Content -Path $checksumPath -Value "$($hash.Hash.ToLower())  $relative"
          }
          $notesPath = Join-Path $releaseDir 'PROTOTYPE-RELEASE-NOTES.md'
          @"
          # OpenCause Compute Worker unsigned prototype

          Commit: $env:GITHUB_SHA
          Workflow: $env:GITHUB_WORKFLOW
          Run: $env:GITHUB_RUN_ID

          This artifact is unsigned and for prototype QA only. Do not distribute as a public release.

          Required before public release:

          - code-sign installer and executable
          - verify checksums
          - run clean Windows install/uninstall QA
          - verify worker registration, pause/resume, logs, resource controls, and revocation behavior
          - publish final release notes and rollback instructions
          "@ | Set-Content -Path $notesPath

      - name: Upload unsigned prototype artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencause-compute-worker-windows-unsigned-prototype
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/win-unpacked/**
            apps/desktop/release/SHA256SUMS.txt
            apps/desktop/release/PROTOTYPE-RELEASE-NOTES.md
          if-no-files-found: error
          retention-days: 14
